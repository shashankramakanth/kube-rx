apiVersion: apps/v1
kind: Deployment
metadata:
  name: healer-agent
  namespace: healer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: healer-agent
  template:
    metadata:
      labels:
        app: healer-agent
    spec:
      serviceAccountName: healer-agent
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: healer-agent
                topologyKey: kubernetes.io/hostname
      containers:
        - name: healer-agent
          image: shashankramakanth/k8s-debugger-agent:v0.2.0
          env:
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: healer-agent-secrets
                  key: openrouter-api-key
            - name: MODEL
              value: "anthropic/claude-3.5-haiku"
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
