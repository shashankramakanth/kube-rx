apiVersion: v1
kind: ServiceAccount
metadata:
  name: healer-agent
  namespace: healer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: healer-agent-reader
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events", "namespaces", "nodes", "services", "endpoints", "configmaps"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: healer-agent-reader
subjects:
  - kind: ServiceAccount
    name: healer-agent
    namespace: healer
roleRef:
  kind: ClusterRole
  name: healer-agent-reader
  apiGroup: rbac.authorization.k8s.io
