apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: healer-webhook
  namespace: healer
  labels:
    release: monitoring        # must match alertmanagerConfigSelector (set via helm values — see note below)
spec:
  route:
    receiver: ai-agent
    groupBy: ["alertname", "pod"]
    groupWait: 10s             # short waits so the demo reacts fast
    groupInterval: 30s
    repeatInterval: 5m
    # Only route alerts from the healer namespace to the agent. Requires the
    # Alertmanager spec to use alertmanagerConfigMatcherStrategy=None — otherwise
    # the operator force-injects namespace=monitoring (this config's namespace)
    # and healer alerts never match. See memory: alertmanagerconfig-namespace-scoping.
    matchers:
      - name: namespace
        value: healer
  receivers:
    - name: ai-agent
      webhookConfigs:
        # Layer 5 target. Placeholder until the agent Service exists.
        # Once the agent runs in the cluster, point this at its in-cluster DNS name.
        - url: http://healer-agent.healer.svc.cluster.local:8080/webhook
          sendResolved: true
