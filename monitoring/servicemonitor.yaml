apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: healer-app
  namespace: monitoring
  labels:
    release: monitoring        # required — Prometheus Operator only picks up ServiceMonitors with this label
spec:
  namespaceSelector:
    matchNames:
      - healer                 # scrape services in the healer namespace
  selector:
    matchLabels:
      app: healer-app          # matches the label we added to the healer-app Service
  endpoints:
    - port: "8000"
      path: /metrics
      interval: 15s
